services:
  # Small-VM defaults:
  # - Disable worker unless explicitly enabled with `--profile vision`.
  # - Tune MySQL to use less memory.

  worker:
    profiles: ["vision"]

  mysql:
    environment:
      MYSQL_INITDB_SKIP_TZINFO: "1"
    command:
      - mysqld
      - --performance_schema=OFF
      - --max_connections=50
      - --table_open_cache=200
      - --thread_cache_size=8
      - --innodb_buffer_pool_size=128M
      - --innodb_log_buffer_size=8M
      - --innodb_flush_log_at_trx_commit=2
      - --sync_binlog=0

