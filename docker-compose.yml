services:
  bot_gateway:
    build:
      context: ./bot_gateway
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      mcp_server:
        condition: service_healthy
    volumes:
      - data:/data
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  mcp_server:
    build:
      context: ./mcp_server
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - data:/data
    ports:
      - "7000:7000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7000/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; import redis; redis.from_url(os.environ['REDIS_URL']).ping(); print('ok')\""]
      interval: 20s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.4
    profiles: ["mysql"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: products
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    volumes:
      - mysql_data:/var/lib/mysql
      - ./ops/scripts/init_mysql_readonly.sql:/docker-entrypoint-initdb.d/init_mysql_readonly.sql:ro,z
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 20s
      timeout: 5s
      retries: 10

volumes:
  data:
  mysql_data:
